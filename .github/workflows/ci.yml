# Phase 6.1 of ifa/codegen/CODEGEN_PLAN.md — CI gates.
#
# Runs on every push and pull request:
# - Build pyc with USE_LLVM=1 so both backends are compiled in.
# - Standard test suite (make test → ./ifa --test + IR fixtures + ./test_pyc.py).
# - `make test_llvm` — the V-language LLVM backend smoke test.
# - LLVM-backend pyc e2e via the PYC_FLAGS hook: floors the pass
#   count at the current baseline (see step comment).
# - DParser grammar validation.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-24.04

    env:
      # Build pyc with the LLVM code path compiled in for the whole
      # job. The Makefile reads this from the environment via
      # `ifdef USE_LLVM` — every `make` invocation in steps below
      # picks it up automatically. The C backend remains the
      # default at runtime.
      USE_LLVM: 1
      # Ubuntu 24.04's unversioned `clang`/`llvm`/`llvm-config`
      # packages resolve to LLVM 18, whose C++20 coroutine ABI
      # (llvm.coro.end's exact intrinsic surface, in particular)
      # differs enough from what the LLVM backend targets that async
      # tests fail to compile under it. Pin the whole job to LLVM 20
      # (a real stable release, not apt.llvm.org's unstable trunk
      # snapshots) via versioned packages + explicit compiler/
      # llvm-config env vars, rather than relying on whatever
      # `clang`/`llvm-config` happen to resolve to by default.
      CC: clang-20
      CXX: clang++-20
      LLVM_CONFIG: /usr/bin/llvm-config-20
      # PYC_LLVM_CXX: the LLVM backend's own compiler invocation (used
      # at pyc *runtime* to turn its emitted .ll into an object file/
      # executable, separate from the CXX above which builds pyc
      # itself) -- must match CXX/LLVM_CONFIG or the coroutine IR pyc
      # emits (matching LLVM 20's intrinsic signatures) gets fed to a
      # differently-versioned clang++ and fails the same way.
      PYC_LLVM_CXX: clang++-20

    steps:
      - name: Checkout pyc
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          # Versioned clang-20/llvm-20 packages (see the job env
          # comment above for why: the unversioned `clang`/`llvm`
          # packages resolve to LLVM 18 on ubuntu-24.04, which the
          # LLVM backend's coroutine codegen isn't compatible with).
          # `llvm-20-dev` ships the headers and `libLLVM*` archives.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang-20 \
            llvm-20 \
            llvm-20-dev \
            libgc-dev \
            libpcre3-dev \
            python3 \
            make

      - name: Build and install DParser (libdparse_gc + make_dparser)
        run: |
          # pyc and ifa link against -ldparse_gc and invoke
          # `make_dparser` for grammar codegen. DParser isn't
          # packaged; build from source with D_USE_GC=1 so it plays
          # nicely with Boehm GC.
          git clone --depth 1 https://github.com/jplevyak/dparser.git /tmp/dparser
          make -C /tmp/dparser D_USE_GC=1
          sudo make -C /tmp/dparser D_USE_GC=1 install
          sudo ldconfig

      - name: Print toolchain versions
        run: |
          $CXX --version
          $LLVM_CONFIG --version
          make --version | head -1
          python3 --version
          make_dparser --help 2>&1 | head -1 || true

      - name: Build pyc + ifa
        # `USE_LLVM=1` is exported job-wide (see jobs.env above) so
        # the LLVM code path is compiled into pyc here. Verifies
        # the `#ifdef USE_LLVM` branches in pyc.cc stay compilable
        # — a regression there would otherwise go undetected.
        run: make

      - name: Unit tests + IR fixtures + e2e (make test)
        # `make test` chains test-unit (./ifa --test), test-ir, and
        # test-e2e (./test_pyc.py). The C backend is the default and
        # the production path; this step is the primary gate.
        run: make test

      - name: V-language LLVM backend smoke (make test_llvm)
        # Builds and runs a small V program through the LLVM
        # backend end-to-end. Issue 012 (missing -lgc) was fixed
        # in the same commit that wired this step up; if this step
        # starts failing again, that's the first place to look.
        run: make -C ifa test_llvm

      - name: LLVM-backend pyc e2e (PYC_FLAGS=-b ./test_pyc.py)
        # PYC_FLAGS=-b prepends `-b` (the LLVM backend selector) to
        # every pyc invocation inside test_pyc.py. The LLVM backend
        # doesn't yet handle method dispatch through closures
        # (phase 3.5 of ifa/codegen/CODEGEN_PLAN.md), so most pyc
        # tests fail to compile. Rather than gate CI on parity that
        # isn't achievable yet, we floor the pass count at the
        # current baseline — CI fails if any *previously passing*
        # LLVM test regresses.
        #
        # Update LLVM_BASELINE_PASS when a PR brings the count up.
        run: |
          LLVM_BASELINE_PASS=37
          set -o pipefail
          PYC_FLAGS=-b ./test_pyc.py 2>&1 | tee /tmp/llvm_e2e.log | tail -20 || true
          passed=$(grep -E '^  passed' /tmp/llvm_e2e.log | awk '{print $2}')
          echo "LLVM-backend pyc e2e: passed=${passed} (baseline=${LLVM_BASELINE_PASS})"
          if [ -z "$passed" ]; then
            echo "ERROR: could not parse pass count from test_pyc output" >&2
            exit 1
          fi
          if [ "$passed" -lt "$LLVM_BASELINE_PASS" ]; then
            echo "ERROR: LLVM pass count dropped below baseline (${passed} < ${LLVM_BASELINE_PASS})" >&2
            exit 1
          fi

      - name: DParser grammar validation (make test_dparse)
        run: make test_dparse
